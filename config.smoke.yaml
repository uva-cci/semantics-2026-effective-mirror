scenarios: inputs/scenarios.smoke.json

legenda_schema: inputs/dsl/legenda.schema.json

max_syntax_retries: 2

output: outputs/output-smoke.ndjson

dsl:
  - name: dcpl
    examples: inputs/dsl/dcpl/examples.json
    schema: inputs/dsl/dcpl/schema.json

models:
  - name: gemma4-e4b
    meta:
      kind: local
      params:
        driver: ollama
        model_id: gemma4:e4b

encoding:
  name: pplx-embed-v1-0.6b
  org: perplexity-ai

inference:
  concurrency:
    ollama: 1

  constants:
    seed: 42
    top_k: 0
    repetition_penalty: 1.1

  defaults:
    temperature: [0.0]
    top_p: [1.0]

  per_backend:
    ollama:
      truncation:
        - { name: "top_p_baseline", top_p: 1.0, min_p: null }
