scenarios: inputs/scenarios.json

legenda_schema: inputs/dsl/legenda.schema.json

max_syntax_retries: 3

dsl:
  - name: dcpl
    examples: inputs/dsl/dcpl/examples.json
    schema: inputs/dsl/dcpl/schema.json

  - name: odrl
    examples: inputs/dsl/odrl/examples.json
    schema: inputs/dsl/odrl/schema.json

models:
  # --- LOCAL MODELS ---
  - name: qwen3.6-moe
    meta:
      kind: local
      params:
        driver: ollama
        model_id: qwen3.6:35b-a3b-q4_K_M

  - name: gemma4-e4b
    meta:
      kind: local
      params:
        driver: ollama
        model_id: gemma4:e4b-it-q4_K_M

  # --- CLOUD MODELS ---
  - name: gpt-5.5-pro
    meta:
      kind: cloud
      provider: openai
      model_id: gpt-5.5-2026-04-23

  - name: gpt-5.5-flash
    meta:
      kind: cloud
      provider: openai
      model_id: gpt-5.5-flash-2026-04-23

  - name: claude-opus-4.7
    meta:
      kind: cloud
      provider: anthropic
      model_id: claude-opus-4-7-20260416

  - name: gemini-3.1-pro
    meta:
      kind: cloud
      provider: google
      model_id: gemini-3.1-pro-preview

  - name: gemini-3-flash
    meta:
      kind: cloud
      provider: google
      model_id: gemini-3-flash-preview

encoding:
  name: pplx-embed-v1-0.6b
  org: perplexity-ai

inference:
  concurrency:
    ollama: 1
    openai: 8
    anthropic: 4
    google: 4

  constants:
    seed: 42
    top_k: 0
    repetition_penalty: 1.1

  defaults:
    temperature: [0.0, 0.4, 0.7, 1.0, 1.2]
    top_p: [0.9, 1.0]

  per_backend:
    ollama:
      truncation:
        - { name: "top_p_baseline", top_p: 0.9, min_p: null }
        - { name: "min_p_low",      top_p: 1.0, min_p: 0.05 }
        - { name: "min_p_med",      top_p: 1.0, min_p: 0.10 }
        - { name: "min_p_high",     top_p: 1.0, min_p: 0.20 }
    openai:
      reasoning_effort: ["low", "medium", "high", "xhigh"]
      text_verbosity: ["low", "medium"]
    anthropic:
      reasoning_budget: [1024, 4096, 16384, 32768]
    google:
      reasoning_budget: [1024, 4096, 16384, 32768]
