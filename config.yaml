pipelines:
  - mirroring
  # - reasoning

scenarios: data/scenarios.json

dsl:
  - name: dcpl
    examples: data/dsl/dcpl/examples.json
    validation:
      - kind: json-schema
        path: data/dsl/dcpl/schema.json

  - name: eflint
    validation:
      - kind: json-schema
        path: data/dsl/eflint/eflint-3.0.0.schema.json
      - kind: bnf
        path: data/dsl/eflint/grammar.bnf

  - name: odrl
    validation:
      - kind: json-ld
        path: data/dsl/odrl/odrl-2.2.ld.json

  - name: symboleo
    validation:
      - kind: bnf
        path: data/dsl/symboleo/grammar.bnf

models:
  - name: gpt-oss-20b
    meta:
      kind: local
      context_length: 131_072
      n_batch: 2048
      n_ubatch: 2048
      url: https://huggingface.co/ggml-org/gpt-oss-20b-GGUF/resolve/main/gpt-oss-20b-mxfp4.gguf

  - name: llama3.2-1b
    meta:
      kind: local
      context_length: 131_072
      n_batch: 2048
      n_ubatch: 2048
      url: https://huggingface.co/QuantFactory/Llama-3.2-1B-GGUF/resolve/main/Llama-3.2-1B.Q8_0.gguf

  - name: qwen2.1-5b
    meta:
      kind: local
      context_length: 32_768
      n_batch: 2048
      n_ubatch: 2048
      url: https://huggingface.co/Qwen/Qwen2-1.5B-Instruct-GGUF/resolve/main/qwen2-1_5b-instruct-q8_0.gguf

  - name: gemma3.1-1b
    meta:
      kind: local
      context_length: 32_768
      n_batch: 2048
      n_ubatch: 2048
      url: https://huggingface.co/unsloth/gemma-3-1b-it-GGUF/resolve/main/gemma-3-1b-it-UD-Q8_K_XL.gguf

encodings:
  - name: all-MiniLM-L6-v2
    org: sentence-transformers

  - name: nomic-embed-text-v1
    org: nomic-ai

inference:
  temperature: [0.0, 0.2, 0.5, 0.8, 1.0]
  top_p: [0.8, 0.9, 0.95, 0.99]
  top_k: [40, 80, 200, 0]
