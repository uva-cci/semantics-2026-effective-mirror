scenarios: data/scenarios.json

max_syntax_retries: 3

dsl:
  - name: dcpl
    examples: data/dsl/dcpl/examples.json
    schema: data/dsl/dcpl/schema.json

  - name: odrl
    examples: data/dsl/odrl/examples.json
    schema: data/dsl/odrl/schema.json

models:
  # --- LOCAL MODELS (OLLAMA) ---
  - name: llama4-scout
    meta:
      kind: local
      params:
        driver: ollama
        model_id: llama4:17b-scout

  - name: llama4-maverick
    meta:
      kind: local
      params:
        driver: ollama
        model_id: llama4:17b-maverick

  - name: qwen3.6-moe
    meta:
      kind: local
      params:
        driver: ollama
        model_id: qwen3.6:35b-a3b

  - name: gemma4-e4b
    meta:
      kind: local
      params:
        driver: ollama
        model_id: gemma4:e4b

  # --- CLOUD MODELS ---
  - name: gpt-5.5-pro
    meta:
      kind: cloud
      provider: openai
      model_id: gpt-5.5-2026-04-23

  - name: gpt-5.5-thinking
    meta:
      kind: cloud
      provider: openai
      model_id: gpt-5.5-thinking-preview

  - name: claude-opus-4.7
    meta:
      kind: cloud
      provider: anthropic
      model_id: claude-opus-4-7-20260416

  - name: claude-mythos-preview
    meta:
      kind: cloud
      provider: anthropic
      model_id: claude-mythos-20260406

  - name: gpt-5.5-flash
    meta:
      kind: cloud
      provider: openai
      model_id: gpt-5.5-flash-2026-04-23

  - name: gemini-3.1-pro
    meta:
      kind: cloud
      provider: google
      model_id: gemini-3.1-pro-preview

  - name: gemini-3-flash
    meta:
      kind: cloud
      provider: google
      model_id: gemini-3-flash-preview

encodings:
  - name: pplx-embed-v1-0.6b
    org: perplexity-ai

inference:
  temperature: [0.0, 0.2, 0.5, 0.8, 1.0]
  top_p: [0.8, 0.9, 0.95, 0.99]
  top_k: [40, 80, 200, 0]
  concurrency:
    ollama: 1
    openai: 8
    anthropic: 4
    google: 4
