scenarios: data/scenarios.json

max_syntax_retries: 3

dsl:
  - name: dcpl
    examples: data/dsl/dcpl/examples.json
    schema: data/dsl/dcpl/schema.json

  - name: odrl
    examples: data/dsl/odrl/examples.json
    schema: data/dsl/odrl/schema.json

models:
  - name: llama3.2
    meta:
      kind: local
      params:
        driver: ollama
        model_id: llama3.2

  - name: gpt-oss
    meta:
      kind: local
      params:
        driver: ollama
        model_id: gpt-oss:20b

  - name: qwen3
    meta:
      kind: local
      params:
        driver: ollama
        model_id: qwen3:8b

  - name: gemma3.1
    meta:
      kind: local
      params:
        driver: ollama
        model_id: gemma3:4b

  - name: gpt-5
    meta:
      kind: cloud
      provider: openai
      model_id: gpt-5-2025-08-07

  - name: gpt-4.1
    meta:
      kind: cloud
      provider: openai
      model_id: gpt-4.1-2025-04-14

  - name: claude-sonnet-4.5
    meta:
      kind: cloud
      provider: anthropic
      model_id: claude-sonnet-4-5-20250929

  - name: claude-haiku-4.5
    meta:
      kind: cloud
      provider: anthropic
      model_id: claude-haiku-4-5-20251001

  - name: claude-opus-4.1
    meta:
      kind: cloud
      provider: anthropic
      model_id: claude-opus-4-1-20250805

encodings:
  - name: pplx-embed-v1-0.6b
    org: perplexity-ai

inference:
  temperature: [0.0, 0.2, 0.5, 0.8, 1.0]
  top_p: [0.8, 0.9, 0.95, 0.99]
  top_k: [40, 80, 200, 0]
