pipelines:
  - mirroring
  # - reasoning

scenarios: data/scenarios.json

max_syntax_retries: 3

dsl:
  - name: dcpl
    examples: data/dsl/dcpl/examples.json
    validation:
      - kind: json-schema
        path: data/dsl/dcpl/schema.json
      - kind: bnf
        path: data/dsl/dcpl/grammar.bnf

  - name: odrl
    examples: data/dsl/odrl/examples.json
    validation:
      - kind: json-schema
        path: data/dsl/odrl/schema.json

  - name: eflint
    examples: data/dsl/eflint/examples.json
    validation:
      - kind: bnf
        path: data/dsl/eflint/grammar.bnf

models:
  - name: llama3.2
    meta:
      kind: local
      params:
        driver: ollama
        model_id: llama3.2

  - name: gpt-oss
    meta:
      kind: local
      params:
        driver: ollama
        model_id: gpt-oss:20b

  - name: qwen3
    meta:
      kind: local
      params:
        driver: ollama
        model_id: qwen3:8b

  - name: gemma3.1
    meta:
      kind: local
      params:
        driver: ollama
        model_id: gemma3:4b

  - name: gpt-5
    meta:
      kind: cloud
      provider: openai
      model_id: gpt-5-2025-08-07

  - name: gpt-4.1
    meta:
      kind: cloud
      provider: openai
      model_id: gpt-4.1-2025-04-14

  - name: claude-sonnet-4.5
    meta:
      kind: cloud
      provider: anthropic
      model_id: claude-sonnet-4-5-20250929

  - name: claude-haiku-4.5
    meta:
      kind: cloud
      provider: anthropic
      model_id: claude-haiku-4-5-20251001

  - name: claude-opus-4.1
    meta:
      kind: cloud
      provider: anthropic
      model_id: claude-opus-4-1-20250805

encodings:
  - name: all-MiniLM-L6-v2
    org: sentence-transformers

  - name: nomic-embed-text-v1
    org: nomic-ai

inference:
  temperature: [0.7]
  top_p: [0.9]
  top_k: [50]
