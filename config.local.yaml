pipelines:
  - mirroring
  # - reasoning

scenarios: data/scenarios.json

max_syntax_retries: 3

dsl:
  - name: dcpl
    examples: data/dsl/dcpl/examples.json
    validation:
      - kind: json-schema
        path: data/dsl/dcpl/schema.json
      - kind: bnf
        path: data/dsl/dcpl/grammar.lark

  - name: odrl
    examples: data/dsl/odrl/examples.json
    validation:
      - kind: json-schema
        path: data/dsl/odrl/schema.json

  - name: eflint
    examples: data/dsl/eflint/examples.json
    validation:
      - kind: bnf
        path: data/dsl/eflint/grammar.lark

models:
  - name: gpt-oss
    meta:
      kind: local
      params:
        driver: ollama
        model_id: gpt-oss:20b

  - name: llama3.2
    meta:
      kind: local
      params:
        driver: ollama
        model_id: llama3.2

  - name: qwen3
    meta:
      kind: local
      params:
        driver: ollama
        model_id: qwen3:8b

  - name: gemma3.1
    meta:
      kind: local
      params:
        driver: ollama
        model_id: gemma3:4b

encodings:
  - name: all-MiniLM-L6-v2
    org: sentence-transformers

  - name: nomic-embed-text-v1
    org: nomic-ai

inference:
  temperature: [0.0, 0.2, 0.5, 0.8, 1.0]
  top_p: [0.8, 0.9, 0.95, 0.99]
  top_k: [40, 80, 200, 0]
